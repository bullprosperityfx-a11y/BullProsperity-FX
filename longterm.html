<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BullProsperity | Longterm Pro</title>
<link rel="stylesheet" href="theme.css">

<script>
(async () => {
  try {
    const res = await fetch("/api/access",{credentials:"include"});
    const data = await res.json();

    if(data.role !== "admin" && data.role !== "premium"){
      window.location.href = "locked.html";
    }
  } catch(err){
    window.location.href = "locked.html";
  }
})();
</script>

<style>
.lt-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  margin-top:24px;
}

.lt-card{
  background:#0c0c0c;
  border:1px solid var(--line);
  border-radius:22px;
  padding:22px;
}

.lt-title{
  font-size:28px;
  color:#fff;
}

.lt-input{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#111;
  border:1px solid #252525;
  border-radius:12px;
  color:#fff;
}

.lt-btn{
  margin-top:10px;
  width:100%;
  padding:12px;
  background:#ffd700;
  border:none;
  border-radius:12px;
  font-weight:800;
}

.lt-list{
  margin-top:15px;
  display:grid;
  gap:10px;
}

.lt-item{
  background:#111;
  padding:12px;
  border-radius:12px;
}

.lt-chart{
  margin-top:20px;
  border-radius:18px;
  overflow:hidden;
}
</style>
</head>

<body data-protected="true">
<div class="page">

<nav class="navbar">
  <a href="hub.html" class="logo">BullProsperity</a>
</nav>

<section class="hero-shell">
  <div class="badge">Longterm Pro</div>
  <h1 class="hero-title">Vermögensaufbau <span class="gold">System</span></h1>
</section>

<section class="lt-grid">

<!-- PORTFOLIO -->
<div class="lt-card">
  <h2 class="lt-title">Portfolio Tracker</h2>

  <input id="asset" class="lt-input" placeholder="Asset (BTC, Gold...)">
  <input id="amount" class="lt-input" placeholder="Betrag €">
  <button class="lt-btn" id="addAsset">Hinzufügen</button>

  <div id="portfolioList" class="lt-list"></div>
</div>

<!-- DCA -->
<div class="lt-card">
  <h2 class="lt-title">DCA Rechner</h2>

  <input id="dcaAmount" class="lt-input" placeholder="Monatlicher Betrag €">
  <input id="dcaYears" class="lt-input" placeholder="Jahre">

  <button class="lt-btn" id="calcDCA">Berechnen</button>

  <div id="dcaResult" class="lt-list"></div>
</div>

<!-- WATCHLIST -->
<div class="lt-card">
  <h2 class="lt-title">Longterm Watchlist</h2>

  <div class="lt-list">
    <div class="lt-item">Bitcoin</div>
    <div class="lt-item">Gold</div>
    <div class="lt-item">S&P500</div>
    <div class="lt-item">Nasdaq</div>
  </div>
</div>

<!-- CHART -->
<div class="lt-card">
  <h2 class="lt-title">Marktübersicht</h2>

  <div class="lt-chart">
    <iframe src="https://www.tradingview.com/widgetembed/?symbol=SP%3ASPX&interval=1D&theme=dark"></iframe>
  </div>
</div>

</section>

</div>

<script>
// Portfolio
document.getElementById("addAsset").onclick = ()=>{
  const asset = document.getElementById("asset").value;
  const amount = document.getElementById("amount").value;

  const list = document.getElementById("portfolioList");
  list.innerHTML += `<div class="lt-item">${asset} - ${amount}€</div>`;
};

// DCA
document.getElementById("calcDCA").onclick = ()=>{
  const amount = parseFloat(document.getElementById("dcaAmount").value);
  const years = parseFloat(document.getElementById("dcaYears").value);

  const result = amount * 12 * years;

  document.getElementById("dcaResult").innerHTML =
    `<div class="lt-item">Gesamt investiert: ${result}€</div>`;
};
</script>

</body>
</html>
